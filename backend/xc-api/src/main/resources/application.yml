server:
  servlet:
    context-path: /api

spring:
  application:
    name: xc-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
