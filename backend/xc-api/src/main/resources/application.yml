server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: /api

spring:
  application:
    name: xc-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2s}
  flyway:
    locations: ${DB_MIGRATION_LOCATIONS:filesystem:../../database/migrations}
    baseline-on-migrate: ${DB_FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${FILE_UPLOAD_MAX_SIZE:20MB}
      max-request-size: ${FILE_UPLOAD_MAX_REQUEST_SIZE:20MB}
  task:
    execution:
      pool:
        core-size: ${TASK_EXECUTION_CORE_SIZE:4}
        max-size: ${TASK_EXECUTION_MAX_SIZE:16}
        queue-capacity: ${TASK_EXECUTION_QUEUE_CAPACITY:200}
    scheduling:
      pool:
        size: ${TASK_SCHEDULING_POOL_SIZE:4}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

management:
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cache:
    redis:
      enabled: ${APP_REDIS_CACHE_ENABLED:false}
      key-prefix: ${APP_REDIS_CACHE_KEY_PREFIX:xc:}
      master-data-ttl-seconds: ${APP_REDIS_MASTER_DATA_TTL_SECONDS:300}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      issuer: ${JWT_ISSUER}
      expires-minutes: ${JWT_EXPIRES_MINUTES}
  media:
    type: ${MEDIA_STORAGE_TYPE:local}
    storage-root: ${MEDIA_STORAGE_ROOT:./uploads/media}
    public-url-prefix: ${MEDIA_PUBLIC_URL_PREFIX:/api/media}
    minio:
      endpoint: ${MINIO_ENDPOINT:}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket: ${MINIO_BUCKET:xc-learning}
      create-bucket: ${MINIO_CREATE_BUCKET:true}
  asr:
    engine-name: ${ASR_ENGINE_NAME:local-asr}
    provider: ${ASR_PROVIDER:mock}
    worker-enabled: ${ASR_WORKER_ENABLED:true}
    initial-delay-ms: ${ASR_INITIAL_DELAY_MS:5000}
    poll-delay-ms: ${ASR_POLL_DELAY_MS:5000}
    batch-size: ${ASR_BATCH_SIZE:5}
    service-url: ${ASR_SERVICE_URL:}
    service-path: ${ASR_SERVICE_PATH:/recognize}
    mock-recognized-text: ${ASR_MOCK_RECOGNIZED_TEXT:}
  payment:
    mock-enabled: ${PAYMENT_MOCK_ENABLED:false}
    wechat-pay:
      enabled: ${WECHAT_PAY_ENABLED:false}
      payment-url-prefix: ${WECHAT_PAY_PAYMENT_URL_PREFIX:}
      notify-secret: ${WECHAT_PAY_NOTIFY_SECRET:}
    alipay:
      enabled: ${ALIPAY_ENABLED:false}
      payment-url-prefix: ${ALIPAY_PAYMENT_URL_PREFIX:}
      notify-secret: ${ALIPAY_NOTIFY_SECRET:}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
