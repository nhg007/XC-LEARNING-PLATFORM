server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import:
      - optional:file:.env.dev[.properties]
      - optional:file:.env[.properties]
  flyway:
    enabled: ${DB_FLYWAY_ENABLED:true}
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: xc-api-dev-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}

app:
  asr:
    provider: ${ASR_PROVIDER:mock}
    worker-enabled: ${ASR_WORKER_ENABLED:true}
  payment:
    mock-enabled: ${PAYMENT_MOCK_ENABLED:true}
  bootstrap:
    membership-plans:
      enabled: ${APP_BOOTSTRAP_MEMBERSHIP_PLANS_ENABLED:true}
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${APP_BOOTSTRAP_ADMIN_USERNAME:}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
      display-name: ${APP_BOOTSTRAP_ADMIN_DISPLAY_NAME:Local Admin}
    student-demo:
      enabled: ${APP_BOOTSTRAP_STUDENT_DEMO_ENABLED:false}
      email: ${APP_BOOTSTRAP_STUDENT_DEMO_EMAIL:}
      password: ${APP_BOOTSTRAP_STUDENT_DEMO_PASSWORD:}
      nickname: ${APP_BOOTSTRAP_STUDENT_DEMO_NICKNAME:Demo Student}
    demo-content:
      enabled: ${APP_BOOTSTRAP_DEMO_CONTENT_ENABLED:false}
    demo-flow:
      enabled: ${APP_BOOTSTRAP_DEMO_FLOW_ENABLED:false}
      reset-users: ${APP_BOOTSTRAP_DEMO_FLOW_RESET_USERS:false}
      standard-flow-enabled: ${APP_BOOTSTRAP_DEMO_FLOW_STANDARD_ENABLED:false}
      teacher-admin:
        username: ${APP_BOOTSTRAP_DEMO_FLOW_TEACHER_ADMIN_USERNAME:}
        password: ${APP_BOOTSTRAP_DEMO_FLOW_TEACHER_ADMIN_PASSWORD:}
        display-name: ${APP_BOOTSTRAP_DEMO_FLOW_TEACHER_ADMIN_DISPLAY_NAME:教师后台管理人员}
      student:
        email: ${APP_BOOTSTRAP_DEMO_FLOW_STUDENT_EMAIL:flow.student@example.com}
        password: ${APP_BOOTSTRAP_DEMO_FLOW_STUDENT_PASSWORD:}
        nickname: ${APP_BOOTSTRAP_DEMO_FLOW_STUDENT_NICKNAME:FlowStudent}
      classroom:
        name: ${APP_BOOTSTRAP_DEMO_FLOW_CLASS_NAME:Demo HSK1 班级}
        description: ${APP_BOOTSTRAP_DEMO_FLOW_CLASS_DESCRIPTION:标准演示班级}
        invite-code: ${APP_BOOTSTRAP_DEMO_FLOW_CLASS_INVITE_CODE:DEMO2026}
      offline-payment:
        trade-no: ${APP_BOOTSTRAP_DEMO_FLOW_OFFLINE_TRADE_NO:OFFLINE-DEMO-FLOW-001}
