server:
  port: ${SERVER_PORT}

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: xc-api-prod-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE}
      minimum-idle: ${DB_POOL_MIN_IDLE}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS}
